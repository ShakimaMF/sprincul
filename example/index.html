<!doctype html>
<html lang="en">
<head>
    <title>Vite App</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
    <link rel="stylesheet" href="style.css"/>
    <script type="module" src="main.js" defer></script>
</head>
<body data-cloaked class="bg-gray-100">
<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <symbol id="check-circle-fill" viewBox="0 0 20 20" fill="currentColor" stroke="currentColor" stroke-width="1">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" />
    </symbol>
    <symbol id="x-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 6 6 18"/>
        <path d="m6 6 12 12"/>
    </symbol>
    <symbol id="refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>
    </symbol>
    <symbol id="filter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 20a1 1 0 0 0 .553.895l2 1A1 1 0 0 0 14 21v-7a2 2 0 0 1 .517-1.341L21.74 4.67A1 1 0 0 0 21 3H3a1 1 0 0 0-.742 1.67l7.225 7.989A2 2 0 0 1 10 14z"/>
    </symbol>
    <symbol id="chev-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
    </symbol>
    <symbol id="chev-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m9 18 6-6-6-6"/>
    </symbol>
</svg>
<section data-model="CarList" class="w-full md:max-w-3xl mx-auto bg-white rounded-md shadow-md p-5 my-5">
    <h1 class="font-bold text-3xl mb-2">Car List</h1>
    <header class="mb-3 flex justify-between items-center">
        <p>Showing page <span data-text="currentPage"></span> of <span data-text="totalPages"></span></p>
        <p>
            <button data-evt="click: pageBack"
                    class="text-black p-1.5 rounded-full hover:bg-gray-100 cursor-pointer"
                    data-class="disabled: isFirstPage">
                <svg class="h-5 w-5"><use href="#chev-left" /></svg>
            </button>
            <button data-evt="click: pageForward"
                    class="text-black p-1.5 rounded-full hover:bg-gray-100 cursor-pointer"
                    data-class="disabled: isLastPage">
                <svg class="h-5 w-5"><use href="#chev-right" /></svg>
            </button>
        </p>
    </header>
    <form class="mb-4 flex items-center" data-evt="submit: searchCars">
        <fieldset class="flex-1">
            <label for="search" class="w-full relative">
                <span class="sr-only">Search cars</span>
                <input id="search" type="search" name="search" class="w-full rounded-md border-1 p-2 border-slate-200"
                       placeholder="Search cars..." data-val="searchTerm" data-evt="input: setSearchTerm">
                <button type="button" data-evt="click: clearSearch" data-class="hidden: searchIsEmpty"
                        class="cursor-pointer rounded-full text-black hover:bg-slate-100 p-1.5 inline-block absolute top-1/2 right-2 transform -translate-y-1/2">
                    <svg class="h-5 w-5"><use href="#x-mark" /></svg>
                </button>
            </label>
        </fieldset>
        <fieldset>
            <button type="submit" data-evt="click: showFilters" class="text-sm text-gray-500 p-3 rounded-md hover:bg-gray-100 cursor-pointer">
                <svg class="h-5 w-5"><use href="#filter" /></svg>
            </button>
        </fieldset>
    </form>
    <fieldset data-class="!block: filtersVisible" class="w-full flex mb-2 items-center hidden">
        <label for="year-select" class="sr-only">Select a year</label>
        <select id="year-select" data-collection="yearOptions"
                class="rounded-full bg-slate-100 border-1 border-slate-200 text-xs p-2"
                data-template="selectOptionTemplate" data-evt="change: filterByYear">
            <option value="all">Select a year</option>
        </select>
        <label for="make-select" class="sr-only">Select a make</label>
        <select id="make-select" data-collection="makeOptions"
                class="rounded-full bg-slate-100 border-1 border-slate-200 text-xs p-2"
                data-template="selectOptionTemplate" data-evt="change: filterByMake">
            <option value="all">Select a make</option>
        </select>
        <label for="model-select" class="sr-only">Select a model</label>
        <select id="model-select" data-collection="modelOptions"
                class="rounded-full bg-slate-100 border-1 border-slate-200 text-xs p-2"
                data-template="selectOptionTemplate" data-evt="change: filterByModel">
            <option value="all">Select a model</option>
        </select>
    </fieldset>
    <ul data-collection="carList" class="overflow-x-auto" data-template="carItemTemplate">
        <li class="p-2 my-2 grid grid-cols-4 gap-3 items-center text-sm color-slate-700 uppercase border-b border-black">
            <span>Year</span>
            <span>Make</span>
            <span>Model</span>
            <span>VIN</span>
        </li>
    </ul>
</section>
<section data-model="GroceryList" class="w-full md:max-w-3xl mx-auto bg-white rounded-md shadow-md p-5 my-5">
    <header class="mb-6 flex justify-between items-center">
        <h1 class="font-bold text-3xl mb-2">Grocery List</h1>
        <button title="Reset list"
                class="text-sm text-gray-500 p-2 rounded-full hover:bg-gray-100 cursor-pointer"
                data-evt="click: refreshList">
            <svg class="h-5 w-5"><use href="#refresh"></use></svg>
        </button>
    </header>
    <form data-evt="submit: addListItem">
        <fieldset class="flex border-0 justify-between mb-4">
            <label for="newItem" class="rounded-full w-full bg-slate-100 relative">
                <input id="newItem" type="text" class="rounded-full w-full py-2 pl-4 pr-23" data-val="newlistItem"
                       required>
                <button class="cursor-pointer whitespace-nowrap text-xs rounded-full bg-black hover:bg-slate-800 text-white px-3 py-1.5 inline-block absolute top-1/2 right-2 transform -translate-y-1/2"
                        type="submit">Add Item
                </button>
            </label>
            <span class="sr-only">Add a new item</span>
        </fieldset>
    </form>
    <nav class="flex mb-4 border-b border-slate-200">
        <a id="all" href="#" class="px-4 py-3 text-sm text-gray-500 hover:underline relative"
           data-class="active: tabIsSelected"
           data-evt="click: setActiveTab">All</a>
        <a id="pending" href="#" class="px-4 py-3 text-sm text-gray-500 hover:underline relative"
           data-class="active: tabIsSelected"
           data-evt="click: setActiveTab">Pending</a>
        <a id="completed" href="#" class="px-4 py-3 text-sm text-gray-500 hover:underline relative"
           data-class="active: tabIsSelected"
           data-evt="click: setActiveTab">Completed</a>
    </nav>
    <ul data-collection="listItems" class="item-list" data-template="listItemTemplate"></ul>
</section>
<template id="selectOptionTemplate">
    <option data-val="value" data-text="label"></option>
</template>
<template id="carItemTemplate">
    <li class="p-2 my-2 grid grid-cols-4 gap-3 items-center border-b border-slate-200 last-of-type:border-b-0">
        <span data-text="year"></span>
        <span data-text="make"></span>
        <span data-text="model"></span>
        <span data-text="vin"></span>
    </li>
</template>
<template id="listItemTemplate">
    <li class="p-2 my-2">
        <fieldset class="flex border-0 w-full gap-3 items-center justify-between">
            <label for="key" class="flex items-center cursor-pointer gap-4 w-full">
                <span class="flex items-center relative">
                    <input id="key" data-val="completed" data-evt="change: toggleListItem" type="checkbox"
                           class="peer h-6 w-6 transition-all appearance-none rounded-full bg-white hover:border-green-500 border border-slate-400 checked:bg-green-500 checked:border-green-500"/>
                    <i class="absolute text-white opacity-0 peer-checked:opacity-100 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                        <svg class="h-3.5 w-3.5"><use href="#check-circle-fill" /></svg>
                    </i>
                </span>
                <span data-text="label" class="block w-full"
                      data-class="line-through: completed; text-slate-500: completed"></span>
            </label>
            <button title="Remove list item" type="button"
                    class="cursor-pointer rounded-full text-red-700 hover:bg-red-100 p-1.5"
                    data-evt="click: deleteListItem">
                <svg class="h-5 w-5"><use href="#x-mark" /></svg>
            </button>
        </fieldset>
    </li>
</template>
</body>
</html>
